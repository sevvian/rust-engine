name: Production Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Install Android NDK
        run: echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"

      - name: Set NDK Path
        run: echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build Rust Engine & Android APK
        working-directory: ./android-app
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK (Optional - using debug for now)
        run: |
          mv android-app/app/build/outputs/apk/release/app-release-unsigned.apk appt-agent-v3.3.apk || \
          mv android-app/app/build/outputs/apk/release/app-release.apk appt-agent-v3.3.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: appt-agent-v3.3.apk
          name: Appointment Agent v3.3 Release
          body: |
            ## High Fidelity Appointment Agent
            - Rust Core with BoringSSL Mimicry
            - Microsecond Precision Strike Logic
            - Android 8-16 Compatibility
            - Encrypted Credential Storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
