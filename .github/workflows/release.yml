
name: Android CI (Rust + Kotlin)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 2026 Best Practice: Define global working directory for the hybrid project
    defaults:
      run:
        working-directory: rust-app-main/android-app

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          rust-app-main/rust-engine/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust-app-main/rust-engine/Cargo.lock') }}

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27 # 2026 Stable NDK

    # FIXED: Using setup-gradle v4 which handles 'chmod +x gradlew' and caching automatically
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        build-root-directory: rust-app-main/android-app

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace
