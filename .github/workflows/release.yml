name: Production Build & Release

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Custom name for the build'
        required: false
        default: 'manual-build'
  
  # Automatically runs when you push a version tag (e.g., v3.3.0)
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    # Required permissions for creating releases and uploading assets
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Install Android NDK
        run: echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"

      - name: Set NDK Path
        run: echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build Rust Engine & Android APK
        working-directory: ./android-app
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare Artifact
        run: |
          # Try to find the generated APK regardless of build variant name
          find android-app/app/build/outputs/apk/ -name "*.apk" -exec cp {} appt-agent-v3.3.apk \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          # Use the tag name if triggered by tag, otherwise use the manual input/timestamp
          tag_name: ${{ github.ref_name == 'main' && format('manual-{0}', github.run_number) || github.ref_name }}
          files: appt-agent-v3.3.apk
          name: Appointment Agent ${{ github.event.inputs.build_name || github.ref_name }}
          body: |
            ## High Fidelity Appointment Agent Build
            - Trigger: ${{ github.event_name }}
            - Rust Core: BoringSSL / rquest Mimicry
            - Microsecond Precision Strike Logic
            - Android 8-16 Compatibility
            - Encrypted Credential Storage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
