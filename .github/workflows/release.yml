name: Android CI (Rust + Kotlin)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Trigger on version tags (e.g., v3.5.2)
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          rust-engine/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust-engine/Cargo.lock') }}

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        build-root-directory: android-app

    - name: Make Gradlew Executable
      run: chmod +x android-app/gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace
      working-directory: android-app

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android-app/app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
