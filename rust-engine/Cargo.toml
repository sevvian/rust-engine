[package]
name = "rust-engine"
version = "3.5.0"
edition = "2021"
description = "High-performance native booking engine for Android"

[lib]
crate-type = ["cdylib", "staticlib"]
name = "rust_engine"

# Option 2: Define the bindgen tool as a binary within the project
[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"
required-features = ["uniffi/cli"]

[dependencies]
tokio = { version = "1.36", features = ["full", "rt", "macros"] }
futures = "0.3"
rquest = { version = "0.20", features = ["boringssl", "socks5", "gzip", "brotli"] }

# Modern 0.28.1 stack with CLI feature enabled
uniffi = { version = "0.28.1", features = ["tokio", "cli"] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
scraper = "0.19"
uuid = { version = "1.8", features = ["v4"] }
rand = "0.8"
tracing = "0.1"
anyhow = "1.0"
thiserror = "1.0"
regex = "1.10"

[build-dependencies]
uniffi = { version = "0.28.1", features = ["build"] }

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1
